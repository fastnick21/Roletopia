name: Build Roletopia

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  portable-libraries:
    name: Portable libraries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build portable libraries
        run: |
          dotnet build src/Roletopia.CoreEngine/Roletopia.CoreEngine.csproj --configuration Release
          dotnet build src/Roletopia.RoleSystem/Roletopia.RoleSystem.csproj --configuration Release
          dotnet build src/Roletopia.Networking/Roletopia.Networking.csproj --configuration Release
          dotnet build src/Roletopia.PluginLoader/Roletopia.PluginLoader.csproj --configuration Release
      - name: Run smoke tests
        run: dotnet run --project tests/Roletopia.SmokeTests/Roletopia.SmokeTests.csproj --configuration Release

  windows-package:
    name: Windows launcher package
    runs-on: windows-latest
    needs: portable-libraries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build complete launcher package
        shell: pwsh
        run: ./scripts/build-launcher.ps1
      - name: Validate complete package
        shell: pwsh
        run: |
          $zip = "artifacts/Roletopia-Launcher-Windows.zip"
          if (!(Test-Path $zip)) { throw "Complete launcher ZIP was not produced." }
          if ((Get-Item $zip).Length -lt 1MB) { throw "Launcher ZIP is unexpectedly small." }
      - uses: actions/upload-artifact@v4
        with:
          name: Roletopia-Launcher-Windows
          path: artifacts/Roletopia-Launcher-Windows.zip
          if-no-files-found: error
          retention-days: 30
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create ${{ github.ref_name }} `
            --title "Roletopia ${{ github.ref_name }}" `
            --generate-notes `
            artifacts/Roletopia-Launcher-Windows.zip
